<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間管理 完全版</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  transition: background 0.5s, color 0.5s;
  color: #000;
  background: #87CEFA;
  min-height: 100vh;
}

/* 総合時間 */
#betaBox {
  position: fixed;
  top: 10px;
  left: 15px;
  font-size: 24px;
  font-weight: bold;
  z-index: 100;
  background: rgba(255, 255, 255, 0.3);
  padding: 5px 10px;
  border-radius: 8px;
}

/* リセット */
#resetBox {
  position: fixed;
  top: 10px;
  right: 15px;
  z-index: 100;
}

#resetBox button {
  height: 40px;
  font-size: 14px;
  border: 1px solid #ccc;
  background: rgba(255, 255, 255, 0.8);
  cursor: pointer;
  border-radius: 5px;
  padding: 0 15px;
}

/* α表示エリア */
#alphaBox {
  padding-top: 100px;
  text-align: center;
  font-size: clamp(40px, 15vw, 90px);
  font-weight: bold;
}

.negative {
  color: #ff4d4d !important;
  text-shadow: 0 0 10px rgba(255,0,0,0.2);
}

/* ボタンエリア */
#buttons {
  width: 90%;
  max-width: 500px;
  margin: 40px auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.mainBtn {
  width: 100%;
  height: 100px;
  font-size: 28px;
  font-weight: bold;
  border: none;
  background: white;
  color: #333;
  cursor: pointer;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: transform 0.1s, box-shadow 0.1s;
}

.mainBtn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* 使い方ページ */
.page {
  display: none;
  padding: 20px;
  box-sizing: border-box;
}

#helpPage {
  background: rgba(255, 255, 255, 0.9);
  color: #333 !important;
  min-height: 100vh;
}

.backBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 100px;
  height: 60px;
  font-size: 18px;
  background: #333;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  z-index: 100;
}

#helpText {
  max-width: 600px;
  margin: 0 auto;
  font-size: 18px;
  line-height: 1.6;
  text-align: left;
}

/* 埋め込み画像 */
.helpImage {
  width: 100%;
  max-width: 450px;
  height: auto;
  margin: 30px auto;
  display: block;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div id="mainPage">
  <div id="betaBox">総合: <span id="beta">0時間0分</span></div>

  <div id="resetBox">
    <button onclick="resetData()">データ消去</button>
  </div>

  <div id="alphaBox">
    <div style="font-size: 20px; opacity: 0.7;">使用可能時間</div>
    <span id="alpha">0時間0分</span>
  </div>

  <div id="buttons">
    <button class="mainBtn" style="border-left: 10px solid #4CAF50;" onclick="add()">＋ 追加（作業）</button>
    <button class="mainBtn" style="border-left: 10px solid #f44336;" onclick="consume()">－ 消費（遊び）</button>
    <button class="mainBtn" style="background: #eee; height: 60px; font-size: 20px;" onclick="goHelp()">使い方・ランク</button>
  </div>
</div>

<div id="helpPage" class="page">
  <h1 style="text-align:center;">使い方</h1>

  <div id="helpText">
    ■ <strong>追加</strong><br>
    勉強や作業をした時間を入力します。入力した分だけ「使用可能時間」と「総合時間」が増えます。<br><br>

    ■ <strong>消費</strong><br>
    スマホや遊びに使った時間を入力します。<strong>入力した時間の2倍</strong>が「使用可能時間」から引かれます。<br><br>

    ■ <strong>ランクシステム</strong><br>
    総合時間に応じて背景が変化します。
  </div>
