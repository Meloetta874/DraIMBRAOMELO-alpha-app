<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: #87CEFA;
  font-family: sans-serif;
}

/* 総合時間 */
#betaBox {
  position: fixed;
  top: 10px;
  left: 15px;
  font-size: 28px;
  font-weight: bold;
}

/* リセット */
#resetBox {
  position: fixed;
  top: 10px;
  right: 15px;
}

#resetBox button {
  height: 45px;
  font-size: 18px;
  border: none;
  background: white;
}

/* α */
#alphaBox {
  margin-top: 120px;
  text-align: center;
  font-size: 90px;
  font-weight: bold;
}

.negative {
  color: red;
}

/* ボタン */
#buttons {
  width: 100%;
  max-width: 500px;
  margin: 40px auto;
}

button {
  width: 100%;
  height: 130px;
  font-size: 28px;
  margin: 10px 0;
  border: none;
  background: white;
}

/* ページ共通 */
.page {
  display: none;
  text-align: center;
  margin-top: 80px;
}

/* 戻る */
.backBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 130px;
  height: 70px;
  font-size: 22px;
}

/* 説明 */
#helpText {
  padding: 20px;
  font-size: 20px;
  text-align: left;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- メイン -->
<div id="mainPage">

  <div id="betaBox">総合時間: <span id="beta">0時間0分</span></div>

  <div id="resetBox">
    <button onclick="resetData()">データ消去</button>
  </div>

  <div id="alphaBox">
    <span id="alpha">0時間0分</span>
  </div>

  <div id="buttons">
    <button onclick="add()">追加</button>
    <button onclick="consume()">消費</button>
    <button onclick="goStats()">統計</button>
    <button onclick="goHelp()">使い方</button>
  </div>

</div>

<!-- 統計 -->
<div id="statsPage" class="page">
  <h1>統計</h1>
  <canvas id="graph"></canvas>
  <button class="backBtn" onclick="back()">戻る</button>
</div>

<!-- 使い方 -->
<div id="helpPage" class="page">
  <h1>使い方</h1>

  <div id="helpText">
    このアプリは「時間」を管理するためのシンプルなツールです。<br><br>

    ■ 追加<br>
    勉強や作業など、頑張った時間を入力します。<br>
    入力した分だけ「時間」と「総合時間」が増えます。<br><br>

    ■ 消費<br>
    スマホや遊びなどに使った時間を入力します。<br>
    入力した時間の2倍が「時間」から引かれます。<br><br>

    ■ 時間について<br>
    「時間」は今あとどれだけ使えるかを表します。<br>
    マイナスになると使いすぎの状態です。<br><br>

    ■ 総合時間<br>
    これまで積み上げた合計時間です。<br><br>

    ■ ルール例<br>
    「スマホ時間は勉強時間の半分まで」など、自分ルールで使えます。
  </div>

  <button class="backBtn" onclick="back()">戻る</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
  alpha: 0,
  beta: 0,
  logs: {}
};

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function formatTime(min) {
  const h = Math.floor(Math.abs(min) / 60);
  const m = Math.abs(min) % 60;
  return (min < 0 ? "-" : "") + h + "時間" + m + "分";
}

function todayKey() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);
  return now.toISOString().slice(0,10);
}

function ensureToday() {
  const key = todayKey();
  if (!data.logs[key]) {
    data.logs[key] = { add:0, consume:0 };
  }
  return key;
}

function updateUI() {
  const alphaEl = document.getElementById("alpha");

  alphaEl.textContent = formatTime(data.alpha);
  document.getElementById("beta").textContent = formatTime(data.beta);

  if (data.alpha < 0) {
    alphaEl.classList.add("negative");
  } else {
    alphaEl.classList.remove("negative");
  }
}

// ページ切替
function showPage(id) {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("statsPage").style.display = "none";
  document.getElementById("helpPage").style.display = "none";

  document.getElementById(id).style.display = "block";
}

// 追加
function add() {
  const val = parseInt(prompt("追加（分）"));
  if (!val || val <= 0) return;

  const key = ensureToday();

  data.alpha += val;
  data.beta += val;
  data.logs[key].add += val;

  save();
  updateUI();
}

// 消費
function consume() {
  const val = parseInt(prompt("消費（分）"));
  if (!val || val <= 0) return;

  const cost = val * 2;
  const key = ensureToday();

  data.alpha -= cost;
  data.logs[key].consume += cost;

  save();
  updateUI();
}

// 統計
function goStats() {
  showPage("statsPage");

  const labels = Object.keys(data.logs);
  const adds = labels.map(d => data.logs[d].add);
  const consumes = labels.map(d => data.logs[d].consume);

  new Chart(document.getElementById("graph"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: '追加', data: adds },
        { label: '消費(×2)', data: consumes }
      ]
    }
  });
}

// 使い方
function goHelp() {
  showPage("helpPage");
}

// 戻る
function back() {
  showPage("mainPage");
}

// リセット
function resetData() {
  const ok = confirm("データは復元できません。本当に削除しますか？");
  if (!ok) return;

  localStorage.removeItem("data");

  data = { alpha: 0, beta: 0, logs: {} };
  updateUI();
}

document.getElementById("mainPage").style.display = "block";
updateUI();
</script>

</body>
</html>
