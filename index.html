<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: #87CEFA;
  font-family: sans-serif;
}

/* β（左上） */
#betaBox {
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 28px;
  font-weight: bold;
}

/* α（中央） */
#alphaBox {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  font-size: 100px;
  font-weight: bold;
}

.negative {
  color: red;
}

/* ボタン */
#buttons {
  position: absolute;
  bottom: 0;
  width: 100%;
}

button {
  width: 90%;
  height: 90px;
  font-size: 28px;
  margin: 10px auto;
  display: block;
  border: none;
  background: white;
}

/* 統計画面 */
#statsPage {
  display: none;
  text-align: center;
}

canvas {
  width: 100%;
}

/* 戻るボタン */
#backBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 120px;
  height: 60px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- メイン画面 -->
<div id="mainPage">

  <div id="betaBox">総合時間: <span id="beta">0</span> 分</div>

  <div id="alphaBox">
    <span id="alpha">0</span> 分
  </div>

  <div id="buttons">
    <button onclick="add()">追加</button>
    <button onclick="consume()">消費</button>
    <button onclick="goStats()">統計</button>
  </div>

</div>

<!-- 統計画面 -->
<div id="statsPage">

  <h1>統計</h1>
  <canvas id="graph"></canvas>

  <button id="backBtn" onclick="back()">戻る</button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {
  alpha: 0,
  beta: 0,
  logs: {}
};

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

function todayKey() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);
  return now.toISOString().slice(0,10);
}

function ensureToday() {
  const key = todayKey();
  if (!data.logs[key]) {
    data.logs[key] = { add:0, consume:0 };
  }
  return key;
}

function updateUI() {
  const alphaEl = document.getElementById("alpha");
  alphaEl.textContent = data.alpha;

  if (data.alpha < 0) {
    alphaEl.classList.add("negative");
  } else {
    alphaEl.classList.remove("negative");
  }

  document.getElementById("beta").textContent = data.beta;
}

// 追加
function add() {
  const val = parseInt(prompt("追加する値"));
  if (!val || val <= 0) return;

  const key = ensureToday();

  data.alpha += val;
  data.beta += val;
  data.logs[key].add += val;

  save();
  updateUI();
}

// 消費
function consume() {
  const val = parseInt(prompt("消費する値"));
  if (!val || val <= 0) return;

  const cost = val * 2;
  const key = ensureToday();

  data.alpha -= cost;
  data.logs[key].consume += cost;

  save();
  updateUI();
}

// 統計へ
function goStats() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("statsPage").style.display = "block";

  const labels = Object.keys(data.logs);
  const adds = labels.map(d => data.logs[d].add);
  const consumes = labels.map(d => data.logs[d].consume);

  new Chart(document.getElementById("graph"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: '追加', data: adds },
        { label: '消費(×2)', data: consumes }
      ]
    }
  });
}

// 戻る
function back() {
  document.getElementById("statsPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
}

updateUI();
</script>

</body>
</html>
